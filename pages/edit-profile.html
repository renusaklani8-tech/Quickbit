<!-- pages/edit-profile.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - Quickbit</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .edit-container {
            max-width: 800px;
            margin: 30px auto;
        }
        
        .edit-header {
            color: white;
            margin-bottom: 30px;
        }
        
        .edit-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .avatar-section {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }
        
        .avatar-preview {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 48px;
            font-weight: bold;
            margin: 0 auto 20px;
            position: relative;
        }
        
        .avatar-upload {
            position: absolute;
            bottom: 0;
            right: 50%;
            transform: translateX(50%);
            background: #2563eb;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 3px solid white;
        }
        
        .form-section {
            margin-bottom: 30px;
            padding-bottom: 30px;
            border-bottom: 2px solid #e5e7eb;
        }
        
        .form-section h3 {
            margin-bottom: 20px;
            color: #1f2937;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #4b5563;
        }
        
        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .form-control:focus {
            border-color: #2563eb;
            outline: none;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }
        
        .form-control.error {
            border-color: #ef4444;
        }
        
        .error-message {
            color: #ef4444;
            font-size: 12px;
            margin-top: 5px;
        }
        
        .phone-input {
            display: flex;
            gap: 10px;
        }
        
        .country-code {
            width: 100px;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
        }
        
        .radio-group {
            display: flex;
            gap: 20px;
            padding: 10px 0;
        }
        
        .radio-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        
        .btn-save {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            padding: 16px 32px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
        }
        
        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(37,99,235,0.3);
        }
        
        .btn-save:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .password-strength {
            margin-top: 10px;
        }
        
        .strength-meter {
            height: 4px;
            background: #e5e7eb;
            border-radius: 2px;
            overflow: hidden;
        }
        
        .strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s;
        }
        
        .strength-bar.weak { width: 25%; background: #ef4444; }
        .strength-bar.medium { width: 50%; background: #f59e0b; }
        .strength-bar.strong { width: 75%; background: #10b981; }
        .strength-bar.very-strong { width: 100%; background: #2563eb; }
        
        .strength-text {
            font-size: 12px;
            margin-top: 5px;
        }
        
        .success-message {
            background: #d1fae5;
            color: #065f46;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
        
        .success-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="../dashboard.html" class="logo">Quickbit<span>.</span></a>
        <nav class="nav-links">
            <a href="../dashboard.html">Dashboard</a>
            <a href="cleaners.html">Find Cleaners</a>
            <a href="bookings.html">My Bookings</a>
            <a href="edit-profile.html" style="color: var(--primary);">Edit Profile</a>
            <span id="userName"></span>
            <button class="btn btn-outline" onclick="logout()">Logout</button>
        </nav>
    </header>

    <main class="container">
        <div class="edit-container">
            <div class="edit-header">
                <h1>Edit Profile</h1>
                <p>Update your personal information</p>
            </div>

            <div class="edit-card">
                <div class="success-message" id="successMessage">
                    <i class="fas fa-check-circle"></i> Profile updated successfully!
                </div>

                <form id="profileForm" onsubmit="saveProfile(event)">
                    <!-- Avatar Section -->
                    <div class="avatar-section">
                        <div class="avatar-preview" id="avatarPreview">
                            <span id="avatarInitial">U</span>
                            <div class="avatar-upload" onclick="document.getElementById('avatarInput').click()">
                                <i class="fas fa-camera"></i>
                            </div>
                        </div>
                        <input type="file" id="avatarInput" accept="image/*" style="display: none;" onchange="previewAvatar(event)">
                        <p style="color: #6b7280;">Click camera icon to change photo</p>
                    </div>

                    <!-- Personal Information -->
                    <div class="form-section">
                        <h3>Personal Information</h3>
                        <div class="form-grid">
                            <div class="form-group">
                                <label>Full Name *</label>
                                <input type="text" class="form-control" id="fullName" required>
                            </div>
                            <div class="form-group">
                                <label>Email Address *</label>
                                <input type="email" class="form-control" id="email" readonly>
                            </div>
                            <div class="form-group">
                                <label>Phone Number *</label>
                                <div class="phone-input">
                                    <select class="country-code" id="countryCode">
                                        <option value="+91">+91 (IN)</option>
                                        <option value="+1">+1 (US)</option>
                                        <option value="+44">+44 (UK)</option>
                                    </select>
                                    <input type="tel" class="form-control" id="phone" required pattern="[0-9]{10}" placeholder="9876543210">
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Date of Birth</label>
                                <input type="date" class="form-control" id="dob">
                            </div>
                        </div>
                    </div>

                    <!-- Address Information -->
                    <div class="form-section">
                        <h3>Address Information</h3>
                        <div class="form-group">
                            <label>Street Address</label>
                            <input type="text" class="form-control" id="address" placeholder="House/Flat No., Building, Street">
                        </div>
                        <div class="form-grid">
                            <div class="form-group">
                                <label>City</label>
                                <input type="text" class="form-control" id="city">
                            </div>
                            <div class="form-group">
                                <label>State</label>
                                <input type="text" class="form-control" id="state">
                            </div>
                            <div class="form-group">
                                <label>Pincode</label>
                                <input type="text" class="form-control" id="pincode" pattern="[0-9]{6}">
                            </div>
                            <div class="form-group">
                                <label>Country</label>
                                <select class="form-control" id="country">
                                    <option value="India">India</option>
                                    <option value="USA">USA</option>
                                    <option value="UK">UK</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- Preferences -->
                    <div class="form-section">
                        <h3>Preferences</h3>
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="language" value="english" checked> English
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="language" value="hindi"> Hindi
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="language" value="tamil"> Tamil
                            </label>
                        </div>
                    </div>

                    <!-- Change Password -->
                    <div class="form-section">
                        <h3>Change Password</h3>
                        <p style="color: #6b7280; margin-bottom: 15px;">Leave blank if you don't want to change</p>
                        
                        <div class="form-group">
                            <label>Current Password</label>
                            <input type="password" class="form-control" id="currentPassword">
                        </div>
                        
                        <div class="form-group">
                            <label>New Password</label>
                            <input type="password" class="form-control" id="newPassword" onkeyup="checkPasswordStrength()">
                            <div class="password-strength">
                                <div class="strength-meter">
                                    <div class="strength-bar" id="strengthBar"></div>
                                </div>
                                <div class="strength-text" id="strengthText"></div>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label>Confirm New Password</label>
                            <input type="password" class="form-control" id="confirmPassword" onkeyup="checkPasswordMatch()">
                            <div id="passwordMatchError" class="error-message"></div>
                        </div>
                    </div>

                    <button type="submit" class="btn-save" id="saveBtn">
                        <i class="fas fa-save"></i> Save Changes
                    </button>
                </form>
            </div>
        </div>
    </main>

    <script src="../js/auth.js"></script>
    <script>
        if (!auth.isAuthenticated()) {
            window.location.href = '../login.html';
        }

        const user = auth.currentUser;

        window.onload = function() {
            loadUserProfile();
            document.getElementById('userName').textContent = user.name;
        };

        function loadUserProfile() {
            document.getElementById('fullName').value = user.name;
            document.getElementById('email').value = user.email;
            document.getElementById('avatarInitial').textContent = user.name.charAt(0);

            // Load saved profile data
            const profile = JSON.parse(localStorage.getItem('profile_' + user.id)) || {};
            
            if (profile.phone) {
                document.getElementById('phone').value = profile.phone;
            }
            if (profile.dob) {
                document.getElementById('dob').value = profile.dob;
            }
            if (profile.address) {
                document.getElementById('address').value = profile.address;
            }
            if (profile.city) {
                document.getElementById('city').value = profile.city;
            }
            if (profile.state) {
                document.getElementById('state').value = profile.state;
            }
            if (profile.pincode) {
                document.getElementById('pincode').value = profile.pincode;
            }
            if (profile.country) {
                document.getElementById('country').value = profile.country;
            }
            if (profile.language) {
                document.querySelector(`input[name="language"][value="${profile.language}"]`).checked = true;
            }
        }

        function previewAvatar(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('avatarPreview').style.backgroundImage = `url(${e.target.result})`;
                    document.getElementById('avatarPreview').style.backgroundSize = 'cover';
                    document.getElementById('avatarInitial').style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        }

        function checkPasswordStrength() {
            const password = document.getElementById('newPassword').value;
            const bar = document.getElementById('strengthBar');
            const text = document.getElementById('strengthText');
            
            let strength = 0;
            
            if (password.length >= 8) strength++;
            if (password.match(/[a-z]+/)) strength++;
            if (password.match(/[A-Z]+/)) strength++;
            if (password.match(/[0-9]+/)) strength++;
            if (password.match(/[$@#&!]+/)) strength++;
            
            bar.className = 'strength-bar';
            if (strength <= 2) {
                bar.classList.add('weak');
                text.textContent = 'Weak password';
            } else if (strength <= 3) {
                bar.classList.add('medium');
                text.textContent = 'Medium password';
            } else if (strength <= 4) {
                bar.classList.add('strong');
                text.textContent = 'Strong password';
            } else {
                bar.classList.add('very-strong');
                text.textContent = 'Very strong password';
            }
        }

        function checkPasswordMatch() {
            const password = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;
            const errorDiv = document.getElementById('passwordMatchError');
            
            if (password && confirm && password !== confirm) {
                errorDiv.textContent = 'Passwords do not match';
                document.getElementById('saveBtn').disabled = true;
            } else {
                errorDiv.textContent = '';
                document.getElementById('saveBtn').disabled = false;
            }
        }

        function saveProfile(event) {
            event.preventDefault();
            
            const profileData = {
                name: document.getElementById('fullName').value,
                phone: document.getElementById('phone').value,
                countryCode: document.getElementById('countryCode').value,
                dob: document.getElementById('dob').value,
                address: document.getElementById('address').value,
                city: document.getElementById('city').value,
                state: document.getElementById('state').value,
                pincode: document.getElementById('pincode').value,
                country: document.getElementById('country').value,
                language: document.querySelector('input[name="language"]:checked').value
            };

            // Save to localStorage
            localStorage.setItem('profile_' + user.id, JSON.stringify(profileData));

            // Show success message
            const successMsg = document.getElementById('successMessage');
            successMsg.classList.add('show');
            
            setTimeout(() => {
                successMsg.classList.remove('show');
            }, 3000);

            // Update user name in header
            document.getElementById('userName').textContent = profileData.name;
        }

        function logout() {
            auth.logout();
        }
    </script>
</body>
</html>
