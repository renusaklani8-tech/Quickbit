<!-- pages/save-worker.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favorite Workers - Quickbit</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .favorites-container {
            padding: 20px 0;
        }
        
        .favorites-header {
            color: white;
            margin: 30px 0;
        }
        
        .favorites-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin: 30px 0;
        }
        
        .worker-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.3s;
            position: relative;
        }
        
        .worker-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        
        .worker-cover {
            height: 100px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            position: relative;
        }
        
        .worker-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            position: absolute;
            bottom: -40px;
            left: 20px;
            border: 4px solid white;
        }
        
        .favorite-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #ef4444;
            font-size: 20px;
            z-index: 10;
        }
        
        .worker-info {
            padding: 50px 20px 20px;
        }
        
        .worker-name {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .worker-profession {
            color: #2563eb;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .worker-stats {
            display: flex;
            gap: 20px;
            margin: 15px 0;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-value {
            font-weight: bold;
            color: #1f2937;
        }
        
        .stat-label {
            font-size: 12px;
            color: #6b7280;
        }
        
        .worker-rating {
            color: #fbbf24;
            margin: 10px 0;
        }
        
        .worker-skills {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 15px 0;
        }
        
        .skill-tag {
            background: #f3f4f6;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #4b5563;
        }
        
        .worker-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-top: 1px solid #e5e7eb;
        }
        
        .worker-price {
            font-size: 20px;
            font-weight: bold;
            color: #2563eb;
        }
        
        .worker-price small {
            font-size: 14px;
            color: #6b7280;
        }
        
        .book-btn {
            background: #2563eb;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 20px;
            margin: 40px 0;
        }
        
        .empty-state i {
            font-size: 64px;
            color: #e5e7eb;
            margin-bottom: 20px;
        }
        
        .collections {
            display: flex;
            gap: 15px;
            margin: 30px 0;
        }
        
        .collection-tab {
            padding: 10px 20px;
            background: white;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .collection-tab.active {
            background: #2563eb;
            color: white;
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="../dashboard.html" class="logo">Quickbit<span>.</span></a>
        <nav class="nav-links">
            <a href="../dashboard.html">Dashboard</a>
            <a href="cleaners.html">Find Cleaners</a>
            <a href="bookings.html">My Bookings</a>
            <a href="save-worker.html" style="color: var(--primary);">Favorites</a>
            <span id="userName"></span>
            <button class="btn btn-outline" onclick="logout()">Logout</button>
        </nav>
    </header>

    <main class="container">
        <div class="favorites-container">
            <div class="favorites-header">
                <h1>Favorite Workers</h1>
                <p>Your saved professionals for quick booking</p>
            </div>

            <!-- Collections -->
            <div class="collections">
                <div class="collection-tab active" onclick="filterCollection('all')">All</div>
                <div class="collection-tab" onclick="filterCollection('cleaning')">Cleaning</div>
                <div class="collection-tab" onclick="filterCollection('plumbing')">Plumbing</div>
                <div class="collection-tab" onclick="filterCollection('electrical')">Electrical</div>
            </div>

            <!-- Favorites Grid -->
            <div class="favorites-grid" id="favoritesGrid"></div>
        </div>
    </main>

    <script src="../js/auth.js"></script>
    <script>
        if (!auth.isAuthenticated()) {
            window.location.href = '../login.html';
        }

        document.getElementById('userName').textContent = auth.currentUser.name;

        const favorites = [
            {
                id: 1,
                name: 'Priya Sharma',
                profession: 'Professional Cleaner',
                rating: 4.9,
                jobs: 128,
                experience: 5,
                price: 550,
                skills: ['Deep Cleaning', 'Sanitization', 'Eco-friendly'],
                avatar: 'P',
                cover: '#667eea'
            },
            {
                id: 2,
                name: 'Rahul Varma',
                profession: 'Master Plumber',
                rating: 4.8,
                jobs: 89,
                experience: 3,
                price: 400,
                skills: ['Pipe Repair', 'Leakage', 'Installation'],
                avatar: 'R',
                cover: '#10b981'
            },
            {
                id: 3,
                name: 'Ananya Das',
                profession: 'Housekeeping Specialist',
                rating: 5.0,
                jobs: 256,
                experience: 8,
                price: 750,
                skills: ['Deep Cleaning', 'Organization', 'Linen Care'],
                avatar: 'A',
                cover: '#f59e0b'
            },
            {
                id: 4,
                name: 'Vikram Singh',
                profession: 'Electrician',
                rating: 4.7,
                jobs: 167,
                experience: 6,
                price: 600,
                skills: ['Wiring', 'Installation', 'Repair'],
                avatar: 'V',
                cover: '#ef4444'
            }
        ];

        function displayFavorites(filtered = favorites) {
            const grid = document.getElementById('favoritesGrid');
            
            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-heart-broken"></i>
                        <h3>No favorite workers yet</h3>
                        <p>Browse cleaners and add them to your favorites</p>
                        <button class="btn btn-primary" onclick="location.href='cleaners.html'">
                            Find Workers
                        </button>
                    </div>
                `;
                return;
            }

            grid.innerHTML = filtered.map(worker => `
                <div class="worker-card">
                    <div class="worker-cover" style="background: ${worker.cover}"></div>
                    <div class="worker-avatar">${worker.avatar}</div>
                    <div class="favorite-btn" onclick="toggleFavorite(${worker.id})">
                        <i class="fas fa-heart" style="color: #ef4444;"></i>
                    </div>
                    
                    <div class="worker-info">
                        <div class="worker-name">${worker.name}</div>
                        <div class="worker-profession">${worker.profession}</div>
                        
                        <div class="worker-rating">
                            ${'★'.repeat(Math.floor(worker.rating))}${worker.rating % 1 ? '½' : ''}
                            <span style="color: #6b7280;">(${worker.rating})</span>
                        </div>
                        
                        <div class="worker-stats">
                            <div class="stat">
                                <div class="stat-value">${worker.jobs}</div>
                                <div class="stat-label">Jobs</div>
                            </div>
                            <div class="stat">
                                <div class="stat-value">${worker.experience}y</div>
                                <div class="stat-label">Experience</div>
                            </div>
                            <div class="stat">
                                <div class="stat-value">${worker.rating}</div>
                                <div class="stat-label">Rating</div>
                            </div>
                        </div>
                        
                        <div class="worker-skills">
                            ${worker.skills.map(skill => `<span class="skill-tag">${skill}</span>`).join('')}
                        </div>
                    </div>
                    
                    <div class="worker-footer">
                        <div class="worker-price">
                            ₹${worker.price}<small>/hr</small>
                        </div>
                        <button class="book-btn" onclick="bookWorker(${worker.id})">
                            Book Now
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function filterCollection(type) {
            document.querySelectorAll('.collection-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            
            if (type === 'all') {
                displayFavorites(favorites);
            } else {
                const filtered = favorites.filter(f => 
                    f.profession.toLowerCase().includes(type)
                );
                displayFavorites(filtered);
            }
        }

        function toggleFavorite(id) {
            alert('Removed from favorites');
            // In real app, remove from list
        }

        function bookWorker(id) {
            const worker = favorites.find(f => f.id === id);
            if (worker) {
                alert(`Booking ${worker.name}...`);
                window.location.href = 'checkout.html';
            }
        }

        // Initial display
        displayFavorites();

        function logout() {
            auth.logout();
        }
    </script>
</body>
</html>
